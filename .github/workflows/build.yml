name: Build sample app with Xcode 16.4

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS Simulator
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project NavStackLifecycleRepro.xcodeproj \
            -scheme NavStackLifecycleRepro \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app as zip
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r NavStackLifecycleRepro-xcode16.4.zip NavStackLifecycleRepro.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NavStackLifecycleRepro-xcode16.4
          path: build/Build/Products/Debug-iphonesimulator/NavStackLifecycleRepro-xcode16.4.zip
          retention-days: 14
